name: Build AIF UI Extension [Container and Helm Chart - Multi-Arch]

on:
  push:
    tags:
      - aif-ui-*

env:
  CHART_PATH: charts/aif-ui
  CHART_REGISTRY: oci://ghcr.io/leomiraanda/charts
  IMAGE_NAME: ghcr.io/leomiraanda/aif-ui

jobs:
  verify-ancestry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag is reachable from main or a matching release branch
        env:
          TAG_PREFIX: aif-ui-
        run: |
          git fetch --quiet origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release-*:refs/remotes/origin/release-*' \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          sha="${{ github.sha }}"
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#"$TAG_PREFIX"}"

          # main is the primary line and may cut any version.
          if git merge-base --is-ancestor "$sha" refs/remotes/origin/main; then
            echo "Tag is reachable from main"
            exit 0
          fi

          # Otherwise the commit must live on a release branch whose version
          # prefixes the tag (e.g. release-2.0 -> 2.0.*, release/2.2607 -> 2.2607.*).
          for ref in $(git for-each-ref --format='%(refname)' \
                'refs/remotes/origin/release-*' 'refs/remotes/origin/release/*'); do
            if git merge-base --is-ancestor "$sha" "$ref"; then
              branch="${ref#refs/remotes/origin/}"
              branch_version="${branch#release-}"
              branch_version="${branch_version#release/}"
              if [[ "$version" == "$branch_version".* ]]; then
                echo "Tag $tag is reachable from $branch and matches its version line"
                exit 0
              fi
              echo "Reachable from $branch but version '$version' != ${branch_version}.* — checking other branches"
            fi
          done

          echo "::error::Tag version '$version' is not reachable from origin/main or a release branch matching its major/minor line"
          exit 1

  prepare:
    needs: verify-ancestry
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      PUBLISH: ${{ steps.tags.outputs.PUBLISH }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Calculate tags
        id: tags
        shell: bash
        run: |
          ref="${{ github.ref }}"
          case "$ref" in
            refs/tags/aif-ui-*)
              VERSION="${ref#refs/tags/aif-ui-}"
              PUBLISH=true
              if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                {
                  echo "METADATA_TAGS<<EOF"
                  echo "$VERSION"
                  echo "latest"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
              else
                {
                  echo "METADATA_TAGS<<EOF"
                  echo "$VERSION"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              VERSION="${{ github.sha }}"
              PUBLISH=false
              {
                echo "METADATA_TAGS<<EOF"
                echo "$VERSION"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_OUTPUT"

  build-container:
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: prepare
    if: needs.prepare.outputs.PUBLISH == 'true'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: 'ui/'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Parse extension name
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="aif-ui-${{ needs.prepare.outputs.VERSION }}"
          yarn parse-tag-name "$TAG" ${{ github.run_id }} "catalog"

      - name: Build extension image
        run: |
          TAG="aif-ui-${{ needs.prepare.outputs.VERSION }}"
          yarn publish-pkgs -c -i '' -r ghcr.io -o 'leomiraanda' -t "$TAG"

      - name: Rebase image onto patched BCI 15.7
        working-directory: .
        run: |
          VERSION="${{ needs.prepare.outputs.VERSION }}"
          docker build -f build/Dockerfile.ui \
            --build-arg BASE=$IMAGE_NAME:$VERSION \
            -t $IMAGE_NAME:$VERSION \
            .

      - name: Tag and push image
        run: |
          VERSION="${{ needs.prepare.outputs.VERSION }}"
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:$VERSION-${{ matrix.arch }}
          docker push $IMAGE_NAME:$VERSION-${{ matrix.arch }}

  manifest-and-chart:
    needs: [prepare, build-container]
    if: needs.prepare.outputs.PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
          RELEASE_TAG: ${{ needs.prepare.outputs.METADATA_TAGS }}
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            docker buildx imagetools create \
              -t $IMAGE_NAME:$tag \
              $IMAGE_NAME:$VERSION-amd64 \
              $IMAGE_NAME:$VERSION-arm64
          done <<< "${RELEASE_TAG}"

      - name: Update Chart.yaml versions
        run: |
          yq -i '.version = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '.appVersion = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '
            .annotations."helm.sh/images" =
            "- image: ghcr.io/leomiraanda/aif-ui:${{ needs.prepare.outputs.VERSION }}\n  name: aif-ui"
          ' $CHART_PATH/Chart.yaml
          yq -i '.image.tag = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/values.yaml

      - name: Package and push Helm chart
        run: |
          chart_package=$(helm package $CHART_PATH --destination . | awk '{print $NF}')
          helm push "$chart_package" $CHART_REGISTRY
