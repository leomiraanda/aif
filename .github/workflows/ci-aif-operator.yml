name: AI Factory Operator CI

on:
  pull_request:
    paths:
      - 'operator/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@d60b41a563a30c99a43c5c628e4d8bc82c7721a9  # v5.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      # - name: Lint
      #   uses: golangci/golangci-lint-action@aaa42aa0628b4d2980d66dc070c4f6e48a2cc0e7  # v9.1.0
      #   with:
      #     version: v2.12
      #     working-directory: operator

      - name: Build
        run: go build ./...

      - name: Test
        run: make test
