name: Build AIF Operator [Container and Helm Chart]

on:
  push:
    tags:
      - aif-operator-*

env:
  IMAGE_NAME: ghcr.io/suse/aif-operator
  CHART_PATH: charts/aif-operator
  CHART_REGISTRY: oci://ghcr.io/suse/chart

jobs:
  verify-ancestry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag is reachable from main or a matching release branch
        env:
          TAG_PREFIX: aif-operator-
        run: |
          git fetch --quiet origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release-*:refs/remotes/origin/release-*' \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          sha="${{ github.sha }}"
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#"$TAG_PREFIX"}"

          # main is the primary line and may cut any version.
          if git merge-base --is-ancestor "$sha" refs/remotes/origin/main; then
            echo "Tag is reachable from main"
            exit 0
          fi

          # Otherwise the commit must live on a release branch whose version
          # prefixes the tag (e.g. release-2.0 -> 2.0.*, release/2.2607 -> 2.2607.*).
          for ref in $(git for-each-ref --format='%(refname)' \
                'refs/remotes/origin/release-*' 'refs/remotes/origin/release/*'); do
            if git merge-base --is-ancestor "$sha" "$ref"; then
              branch="${ref#refs/remotes/origin/}"
              branch_version="${branch#release-}"
              branch_version="${branch_version#release/}"
              if [[ "$version" == "$branch_version".* ]]; then
                echo "Tag $tag is reachable from $branch and matches its version line"
                exit 0
              fi
              echo "Reachable from $branch but version '$version' != ${branch_version}.* — checking other branches"
            fi
          done

          echo "::error::Tag version '$version' is not reachable from origin/main or a release branch matching its major/minor line"
          exit 1

  prepare:
    needs: verify-ancestry
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      PUBLISH: ${{ steps.tags.outputs.PUBLISH }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Calculate tags
        id: tags
        shell: bash
        run: |
          ref="${{ github.ref }}"
          case "$ref" in
            refs/tags/aif-operator-*)
              VERSION="${ref#refs/tags/aif-operator-}"
              PUBLISH=true
              if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                {
                  echo "METADATA_TAGS<<EOF"
                  echo "$VERSION"
                  echo "latest"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
              else
                {
                  echo "METADATA_TAGS<<EOF"
                  echo "$VERSION"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              VERSION="${{ github.sha }}"
              PUBLISH=false
              {
                echo "METADATA_TAGS<<EOF"
                echo "$VERSION"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_OUTPUT"

  build-container:
    needs: prepare
    if: needs.prepare.outputs.PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            ${{ needs.prepare.outputs.METADATA_TAGS }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: operator
          file: build/Dockerfile.operator
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.VERSION }}
            COMMIT=${{ github.sha }}

  build-chart:
    needs: [prepare, build-container]
    if: needs.prepare.outputs.PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart.yaml versions
        run: |
          yq -i '.version = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '.appVersion = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '
            .annotations."helm.sh/images" =
            "- image: ghcr.io/suse/aif-operator:${{ needs.prepare.outputs.VERSION }}\n  name: aif-operator"
          ' $CHART_PATH/Chart.yaml

      - name: Package and push Helm chart
        run: |
          chart_package=$(helm package $CHART_PATH --destination . | awk '{print $NF}')
          helm push "$chart_package" $CHART_REGISTRY
