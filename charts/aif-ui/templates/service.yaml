apiVersion: v1
kind: Service
metadata:
  name: {{ include "aif-ui.fullname" . }}-svc
  labels:
    {{- include "aif-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "aif-ui.selectorLabels" . | nindent 4 }}
