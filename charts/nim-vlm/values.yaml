global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

image:
  registry: "registry.suse.com"
  repository: ai/containers/nvidia/llava-v1.6-mistral-7b
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: Recreate

service:
  port: 8000
  type: ClusterIP

resources:
  requests:
    cpu: "16"
    memory: "64Gi"
  limits:
    cpu: "16"
    memory: "64Gi"
    nvidia.com/gpu: "2"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

nodeSelector:
  nvidia.com/gpu.present: "true"

imagePullSecrets:
  - name: suse-registry-creds

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

env: []

affinity: {}

podAnnotations: {}

extraVolumes: []
extraVolumeMounts: []

priorityClassName: ""

# Note: with replicaCount=1 and minAvailable=1, PDB blocks all voluntary evictions.
# Set replicaCount >= 2 when enabling PDB.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
