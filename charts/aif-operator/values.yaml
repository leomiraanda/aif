global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  repository: suse/aif-operator
  tag: ""              # empty string → templated to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  name: ""

replicaCount: 1

service:
  type: ClusterIP
  ports:
    api: 8080
    health: 8081
    metrics: 8082
    webhook: 9443

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  mountPath: /data

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

podAnnotations: {}

metrics:
  enabled: true

extraEmptyDirs:
  - /data/charts
  - /data/git
  - /tmp

operator:
  logLevel: info
  logFormat: json
  catalogRefresh: 10m

webhook:
  enabled: true
  tlsMode: cert-manager
  certManager:
    enabled: true

nodeSelector: {}
tolerations: []
affinity: {}

# Note: with replicaCount=1 and minAvailable=1, PDB blocks all voluntary evictions.
# Set replicaCount >= 2 when enabling PDB.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
