global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Image configuration — see README.md "Air-Gap Install Modes" for registry override patterns.
image:
  registry: ghcr.io
  repository: suse/aif-operator
  tag: ""              # empty string → templated to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  name: ""

replicaCount: 1

service:
  type: ClusterIP
  ports:
    api: 8080
    health: 8081
    metrics: 8082
    webhook: 9443

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  mountPath: /data

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

podAnnotations: {}

metrics:
  enabled: true

# Writable scratch paths (emptyDir mounts that mask PVC subpaths when persistence is enabled).
extraEmptyDirs:
  - /data/charts
  - /data/git
  - /tmp

operator:
  logLevel: info
  logFormat: json
  catalogRefresh: 10m

webhook:
  enabled: true
  tlsMode: cert-manager
  certManager:
    enabled: true

nodeSelector: {}
tolerations: []
affinity: {}

# Note: with replicaCount=1 and minAvailable=1, PDB blocks all voluntary evictions.
# Set replicaCount >= 2 when enabling PDB.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# UI extension auto-install — creates an InstallAIExtension CR when the operator is deployed.
# Set aiExtension.enabled=false to skip extension installation.
aiExtension:
  enabled: true
  source:
    kind: Helm          # "Helm" (container-based) or "Git"
    helm:
      chartURL: "oci://ghcr.io/suse/chart/suse-ai-lifecycle-manager"
      version: "1.1.0"
    git:
      repo: "https://github.com/SUSE/suse-ai-lifecycle-manager"
      branch: "gh-pages"
  extension:
    name: "suse-ai-lifecycle-manager"
    version: "1.1.0"
  cleanup:
    image:
      registry: registry.suse.com
      repository: suse/kubectl
      tag: "1.35"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
