global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

manager:
  replicaCount: 1
  
  image:
    registry: ghcr.io
    repository: suse/aif-operator
    tag: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  args:
    - --leader-elect

  env: []

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
        type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
        drop:
            - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
        cpu: 500m
        memory: 128Mi
    requests:
        cpu: 10m
        memory: 64Mi

  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: 8081
      periodSeconds: 20
      initialDelaySeconds: 15
    readiness:
      enabled: true
      httpGet:
        path: /readyz
        port: 8081
      periodSeconds: 10
      initialDelaySeconds: 5

  nodeSelector: {}
  tolerations: []
  affinity: {}

rbacHelpers:
  enable: false

metrics:
  enable: true
  port: 8443

api:
  port: 8080

# UI extension auto-install — creates an InstallAIExtension CR when the operator is deployed.
# Set aiExtension.enabled=false to skip extension installation.
aiExtension:
  enabled: true
  source:
    kind: Helm
    helm:
      chartURL: "oci://ghcr.io/suse/chart/aif-ui"
      version: "0.1.0-dev.2"
      # values are merged onto the aif-ui chart's default values. Useful for
      # overriding the UI image during development:
      #   aiExtension.source.helm.values.image.registry=ghcr.io
      #   aiExtension.source.helm.values.image.repository=thbertoldi/aif-ui
      #   aiExtension.source.helm.values.image.tag=0.1.0-dev.2
      values: {}
  extension:
    name: "aif-ui"
    version: "0.1.0-dev.2"
  cleanup:
    image:
      registry: registry.suse.com
      repository: suse/kubectl
      tag: "1.35"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true

# Default blueprints bundled with the chart. When enabled, the curated Blueprint
# CRs under files/blueprints/ are created on install and reconciled on upgrade.
# Disable to manage blueprints exclusively through other means (e.g. a future
# git source) without the chart re-creating its defaults.
defaultBlueprints:
  enabled: true
