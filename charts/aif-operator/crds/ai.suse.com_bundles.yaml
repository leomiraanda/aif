---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bundles.ai.suse.com
spec:
  group: ai.suse.com
  names:
    kind: Bundle
    listKind: BundleList
    plural: bundles
    shortNames:
    - bnd
    singular: bundle
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.targetBlueprint
      name: Target
      type: string
    - jsonPath: .spec.useCase
      name: Use Case
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Bundle is the Schema for the bundles API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BundleSpec defines the desired state of Bundle
            properties:
              authors:
                description: Authors is a list of author display names
                items:
                  type: string
                type: array
              components:
                description: Components are the Apps and/or Blueprints to include
                items:
                  description: ComponentRef references an App or Blueprint component
                  properties:
                    app:
                      description: App reference, populated when Kind=App
                      properties:
                        chart:
                          description: Chart is the chart name
                          minLength: 1
                          type: string
                        repo:
                          description: Repo is the Helm repository URL
                          minLength: 1
                          type: string
                        version:
                          description: Version is the chart version
                          minLength: 1
                          type: string
                      required:
                      - chart
                      - repo
                      - version
                      type: object
                    blueprint:
                      description: Blueprint reference, populated when Kind=Blueprint
                      properties:
                        name:
                          description: Name is the Blueprint lineage name
                          minLength: 1
                          type: string
                        version:
                          description: Version is the semantic version
                          minLength: 1
                          type: string
                      required:
                      - name
                      - version
                      type: object
                    kind:
                      description: Kind is the component type
                      enum:
                      - App
                      - Blueprint
                      type: string
                    name:
                      description: Name is the local handle used as a key for valueOverrides
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                minItems: 1
                type: array
              description:
                description: Description is free-text description of the Bundle
                maxLength: 1024
                type: string
              paused:
                description: Paused suspends reconciliation when true
                type: boolean
              targetBlueprint:
                description: TargetBlueprint is the Blueprint lineage name this Bundle
                  publishes into
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              title:
                description: Title is the human-readable name of the Bundle
                maxLength: 128
                minLength: 1
                type: string
              useCase:
                description: UseCase categorizes the Bundle's purpose
                enum:
                - rag
                - vision
                - fine-tuning
                - inference
                - other
                type: string
              valueOverrides:
                additionalProperties:
                  type: string
                description: ValueOverrides contains per-component Helm values YAML,
                  keyed by ComponentRef.name
                type: object
            required:
            - components
            - targetBlueprint
            - title
            - useCase
            type: object
          status:
            description: BundleStatus defines the observed state of Bundle
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the Bundle's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase
                enum:
                - Draft
                - Submitted
                - ChangesRequested
                type: string
              publishedVersions:
                description: PublishedVersions is the history of published Blueprint
                  versions
                items:
                  description: PublishedVersionRef tracks a published Blueprint version
                  properties:
                    blueprintName:
                      description: BlueprintName is the lineage name
                      type: string
                    publishedAt:
                      description: PublishedAt is when the version was published
                      format: date-time
                      type: string
                    publishedBy:
                      description: PublishedBy is the Rancher username who approved
                        publication
                      type: string
                    version:
                      description: Version is the semantic version
                      type: string
                  required:
                  - blueprintName
                  - publishedAt
                  - publishedBy
                  - version
                  type: object
                maxItems: 100
                type: array
              review:
                description: Review is set when phase == ChangesRequested
                properties:
                  reviewedAt:
                    description: ReviewedAt is the review timestamp
                    format: date-time
                    type: string
                  reviewedBy:
                    description: ReviewedBy is the Rancher username who reviewed
                    type: string
                  reviewerComment:
                    description: ReviewerComment is the reviewer's feedback
                    type: string
                required:
                - reviewedAt
                - reviewedBy
                - reviewerComment
                type: object
              submission:
                description: Submission is set when phase != Draft
                properties:
                  changeDescription:
                    description: ChangeDescription describes what changed in this
                      version
                    type: string
                  generationAtSubmit:
                    description: GenerationAtSubmit is the Bundle generation at submit
                      time
                    format: int64
                    type: integer
                  proposedVersion:
                    description: ProposedVersion is the semantic version proposed
                      for publication
                    type: string
                  submittedAt:
                    description: SubmittedAt is the submission timestamp
                    format: date-time
                    type: string
                  submittedBy:
                    description: SubmittedBy is the Rancher username who submitted
                    type: string
                required:
                - generationAtSubmit
                - proposedVersion
                - submittedAt
                - submittedBy
                type: object
              testDeploys:
                description: TestDeploys contains recent test deploy records (capped
                  at 10)
                items:
                  description: TestDeployRecord tracks a single test deployment
                  properties:
                    result:
                      description: Result is the test outcome
                      enum:
                      - Success
                      - Failed
                      - Running
                      type: string
                    startedAt:
                      description: StartedAt is when the test deploy started
                      format: date-time
                      type: string
                    targetCluster:
                      description: TargetCluster is the cluster ID where the test
                        was deployed
                      type: string
                    workloadRef:
                      description: WorkloadRef is the namespace/name of the test Workload
                      type: string
                  required:
                  - result
                  - startedAt
                  - targetCluster
                  - workloadRef
                  type: object
                maxItems: 10
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
