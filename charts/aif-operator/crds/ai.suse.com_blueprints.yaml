---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: blueprints.ai.suse.com
spec:
  group: ai.suse.com
  names:
    kind: Blueprint
    listKind: BlueprintList
    plural: blueprints
    shortNames:
    - bp
    singular: blueprint
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.blueprintName
      name: Lineage
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.useCase
      name: Use Case
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Blueprint is the Schema for the blueprints API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BlueprintSpec defines the desired state of Blueprint
            properties:
              blueprintName:
                description: BlueprintName is the lineage name
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              changeDescription:
                description: ChangeDescription describes what changed in this version
                maxLength: 2048
                type: string
              components:
                description: Components are the pinned components
                items:
                  description: ComponentRef references an App or Blueprint component
                  properties:
                    app:
                      description: App reference, populated when Kind=App
                      properties:
                        chart:
                          description: Chart is the chart name
                          minLength: 1
                          type: string
                        repo:
                          description: Repo is the Helm repository URL
                          minLength: 1
                          type: string
                        version:
                          description: Version is the chart version
                          minLength: 1
                          type: string
                      required:
                      - chart
                      - repo
                      - version
                      type: object
                    blueprint:
                      description: Blueprint reference, populated when Kind=Blueprint
                      properties:
                        name:
                          description: Name is the Blueprint lineage name
                          minLength: 1
                          type: string
                        version:
                          description: Version is the semantic version
                          minLength: 1
                          type: string
                      required:
                      - name
                      - version
                      type: object
                    kind:
                      description: Kind is the component type
                      enum:
                      - App
                      - Blueprint
                      type: string
                    name:
                      description: Name is the local handle used as a key for valueOverrides
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                minItems: 1
                type: array
              description:
                description: Description is free-text description
                maxLength: 1024
                type: string
              publishedAt:
                description: PublishedAt is the publish timestamp
                format: date-time
                type: string
              publishedBy:
                description: PublishedBy is the username of the approver (for Published)
                  or "aif-system" (for WrapsVendorChart)
                type: string
              source:
                description: Source indicates how this Blueprint was created
                properties:
                  publishedFrom:
                    description: PublishedFrom is populated when Type=Published
                    properties:
                      bundleGeneration:
                        description: BundleGeneration is the Bundle generation at
                          submit time
                        format: int64
                        type: integer
                      bundleName:
                        description: BundleName is the name of the source Bundle
                        type: string
                      bundleNamespace:
                        description: BundleNamespace is the namespace of the source
                          Bundle
                        type: string
                    required:
                    - bundleGeneration
                    - bundleName
                    - bundleNamespace
                    type: object
                  type:
                    description: Type indicates the source type
                    enum:
                    - WrapsVendorChart
                    - Published
                    type: string
                  vendorChartRef:
                    description: VendorChartRef is populated when Type=WrapsVendorChart
                    properties:
                      chart:
                        description: Chart is the chart name
                        minLength: 1
                        type: string
                      provider:
                        description: Provider identifies the vendor
                        minLength: 1
                        type: string
                      repo:
                        description: Repo is the Helm repository URL
                        minLength: 1
                        type: string
                      version:
                        description: Version is the chart version
                        minLength: 1
                        type: string
                    required:
                    - chart
                    - provider
                    - repo
                    - version
                    type: object
                required:
                - type
                type: object
              useCase:
                description: UseCase categorizes the Blueprint's purpose
                enum:
                - rag
                - vision
                - fine-tuning
                - inference
                - other
                type: string
              valueOverrides:
                additionalProperties:
                  type: string
                description: ValueOverrides contains per-component Helm values YAML
                type: object
              version:
                description: Version is the semantic version
                pattern: ^\d+\.\d+\.\d+$
                type: string
            required:
            - blueprintName
            - components
            - publishedAt
            - publishedBy
            - source
            - useCase
            - version
            type: object
          status:
            description: BlueprintStatus defines the observed state of Blueprint
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the Blueprint's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentCount:
                description: DeploymentCount is the number of currently-deployed Workloads
                  sourced from this Blueprint version
                format: int32
                type: integer
              deprecation:
                description: Deprecation is set when phase != Active
                properties:
                  actionedAt:
                    description: ActionedAt is when the action occurred
                    format: date-time
                    type: string
                  actionedBy:
                    description: ActionedBy is the username who actioned the deprecation/withdrawal
                    type: string
                  reason:
                    description: Reason for the deprecation or withdrawal
                    type: string
                required:
                - actionedAt
                - actionedBy
                type: object
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase
                enum:
                - Active
                - Deprecated
                - Withdrawn
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
