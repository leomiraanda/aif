      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InstallAIExtension is the Schema for the installaiextensions
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of InstallAIExtension
            properties:
              extension:
                description: Extension identifies the UIPlugin for post-install verification.
                properties:
                  name:
                    description: |-
                      Name is the UIPlugin resource name to verify after chart installation.
                      This must match the UIPlugin name created by the Helm chart.
                    minLength: 1
                    type: string
                  version:
