                description: |-
                  Source configures how the UI extension assets are served and
                  how the ClusterRepo is created.
                properties:
                  git:
                    description: Git is populated when Kind=Git.
                    properties:
                      branch:
                        default: gh-pages
                        description: Branch is the git branch serving the extension
                          assets (typically "gh-pages").
                        minLength: 1
                        type: string
                      repo:
                        description: Repo is the git repository URL containing the
                          extension's index.yaml.
                        minLength: 1
                        type: string
