                      "Helm" installs a Helm chart that deploys a container serving extension assets and creates a URL-based ClusterRepo.
                      "Git" creates a ClusterRepo pointing to a git repository branch.
                    enum:
                    - Helm
                    - Git
                    type: string
                required:
                - kind
                type: object
                x-kubernetes-validations:
                - message: helm is required when kind is Helm
                  rule: 'self.kind == ''Helm'' ? has(self.helm) : true'
                - message: git must not be set when kind is Helm
                  rule: 'self.kind == ''Helm'' ? !has(self.git) : true'
                - message: git is required when kind is Git
                  rule: 'self.kind == ''Git'' ? has(self.git) : true'
                - message: helm must not be set when kind is Git
                  rule: 'self.kind == ''Git'' ? !has(self.helm) : true'
            required:
