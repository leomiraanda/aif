---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: workloads.ai.suse.com
spec:
  group: ai.suse.com
  names:
    kind: Workload
    listKind: WorkloadList
    plural: workloads
    shortNames:
    - wl
    singular: workload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.recoveryFailureCount
      name: Failures
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workload is the Schema for the workloads API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkloadSpec defines the desired state of Workload
            properties:
              deployStrategy:
                default: helm
                description: DeployStrategy indicates the deployment method
                enum:
                - helm
                - gitops
                type: string
              name:
                description: Name is the workload display name
                maxLength: 253
                minLength: 1
                type: string
              paused:
                description: Paused suspends reconciliation when true
                type: boolean
              replicas:
                default: 1
                description: Replicas is the desired replica count
                format: int32
                type: integer
              scaling:
                description: Scaling defines scaling configuration
                properties:
                  maxReplicas:
                    description: MaxReplicas is the HPA maximum
                    format: int32
                    type: integer
                  minReplicas:
                    default: 1
                    description: MinReplicas is the HPA minimum
                    format: int32
                    type: integer
                  targetCPUUtilizationPercent:
                    description: TargetCPUUtilizationPercent is the HPA CPU target
                    format: int32
                    type: integer
                  vpa:
                    description: VPA configuration
                    properties:
                      enabled:
                        default: false
                        description: Enabled enables VPA
                        type: boolean
                      updateMode:
                        default: Auto
                        description: UpdateMode is the VPA update mode
                        enum:
                        - Auto
                        - Initial
                        - "Off"
                        type: string
                    type: object
                type: object
              source:
                description: Source indicates the provenance of this Workload
                properties:
                  app:
                    description: App is populated when Kind=App
                    properties:
                      chart:
                        description: Chart is the chart name
                        minLength: 1
                        type: string
                      repo:
                        description: Repo is the Helm repository URL
                        minLength: 1
                        type: string
                      version:
                        description: Version is the chart version
                        minLength: 1
                        type: string
                    required:
                    - chart
                    - repo
                    - version
                    type: object
                  blueprint:
                    description: Blueprint is populated when Kind=Blueprint
                    properties:
                      name:
                        description: Name is the Blueprint lineage name
                        minLength: 1
                        type: string
                      version:
                        description: Version is the semantic version
                        minLength: 1
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  kind:
                    description: |-
                      Kind is a source-provenance discriminator, not a Kubernetes TypeMeta.Kind.
                      "App" and "Blueprint" correspond to CRDs of the same name.
                    enum:
                    - App
                    - Blueprint
                    type: string
                required:
                - kind
                type: object
              strategy:
                description: Strategy defines the deployment strategy
                properties:
                  automaticRecovery:
                    description: AutomaticRecovery configuration
                    properties:
                      enabled:
                        default: false
                        description: Enabled enables auto-rollback on ProgressDeadlineExceeded
                        type: boolean
                      failureThreshold:
                        default: 3
                        description: FailureThreshold is consecutive failures before
                          rollback
                        format: int32
                        type: integer
                    type: object
                  blueGreen:
                    description: BlueGreen configuration
                    properties:
                      autoPromotionSeconds:
                        default: 0
                        description: AutoPromotionSeconds is seconds before auto-promoting
                          preview (0 = manual)
                        format: int32
                        type: integer
                    type: object
                  canary:
                    description: Canary configuration
                    properties:
                      steps:
                        description: Steps define the canary rollout steps
                        items:
                          description: CanaryStep defines a single canary deployment
                            step
                          properties:
                            pauseSeconds:
                              description: PauseSeconds is the pause duration between
                                steps
                              format: int32
                              type: integer
                            weight:
                              description: Weight is the traffic weight (0-100)
                              format: int32
                              maximum: 100
                              minimum: 0
                              type: integer
                          required:
                          - weight
                          type: object
                        type: array
                    type: object
                  rollingUpdate:
                    description: RollingUpdate configuration
                    properties:
                      maxSurge:
                        anyOf:
                        - type: integer
                        - type: string
                        default: "1"
                        description: MaxSurge is the maximum number of pods that can
                          be created over the desired replicas
                        x-kubernetes-int-or-string: true
                      maxUnavailable:
                        anyOf:
                        - type: integer
                        - type: string
                        default: "0"
                        description: MaxUnavailable is the maximum number of pods
                          that can be unavailable during the update
                        x-kubernetes-int-or-string: true
                    type: object
                  type:
                    default: RollingUpdate
                    description: Type is the strategy type
                    enum:
                    - RollingUpdate
                    - BlueGreen
                    - Canary
                    - AutomaticRecovery
                    type: string
                type: object
              targetClusters:
                description: |-
                  TargetClusters lists the downstream cluster IDs the workload should
                  land on. For deployStrategy=helm (P4-3b), each entry drives one
                  fleet.cattle.io/v1alpha1 Bundle.spec.targets[].clusterName fan-out
                  entry, so the slice is load-bearing: an empty slice means "do not
                  target any cluster" (Fleet creates the Bundle but reconciles zero
                  BundleDeployments) and the Workload stays at phase=Pending until
                  the field is populated.
                items:
                  type: string
                type: array
              valueOverrides:
                additionalProperties:
                  type: string
                description: ValueOverrides contains per-component Helm values overrides
                type: object
            required:
            - name
            - source
            type: object
          status:
            description: WorkloadStatus defines the observed state of Workload
            properties:
              componentReleases:
                description: ComponentReleases tracks per-component Helm release status
                items:
                  description: ComponentReleaseStatus tracks a single component's
                    Helm release status
                  properties:
                    name:
                      description: Name is the component name
                      type: string
                    releaseName:
                      description: ReleaseName is the Helm release name
                      type: string
                    revision:
                      description: Revision is the Helm release revision
                      format: int32
                      type: integer
                    status:
                      description: Status is the Helm release status
                      type: string
                  required:
                  - name
                  - releaseName
                  - status
                  type: object
                maxItems: 100
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the Workload's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentHistory:
                description: DeploymentHistory is the ordered deployment revision
                  history
                items:
                  description: DeploymentRecord tracks a single deployment revision
                  properties:
                    helmRevisions:
                      additionalProperties:
                        type: integer
                      description: HelmRevisions maps component names to Helm release
                        revisions
                      type: object
                    phase:
                      description: Phase is the phase this revision reached
                      type: string
                    revision:
                      description: Revision is the deployment revision number
                      format: int64
                      type: integer
                    source:
                      description: Source is the source reference at this revision
                      properties:
                        app:
                          description: App is populated when Kind=App
                          properties:
                            chart:
                              description: Chart is the chart name
                              minLength: 1
                              type: string
                            repo:
                              description: Repo is the Helm repository URL
                              minLength: 1
                              type: string
                            version:
                              description: Version is the chart version
                              minLength: 1
                              type: string
                          required:
                          - chart
                          - repo
                          - version
                          type: object
                        blueprint:
                          description: Blueprint is populated when Kind=Blueprint
                          properties:
                            name:
                              description: Name is the Blueprint lineage name
                              minLength: 1
                              type: string
                            version:
                              description: Version is the semantic version
                              minLength: 1
                              type: string
                          required:
                          - name
                          - version
                          type: object
                        kind:
                          description: |-
                            Kind is a source-provenance discriminator, not a Kubernetes TypeMeta.Kind.
                            "App" and "Blueprint" correspond to CRDs of the same name.
                          enum:
                          - App
                          - Blueprint
                          type: string
                      required:
                      - kind
                      type: object
                    timestamp:
                      description: Timestamp is when this revision was deployed
                      format: date-time
                      type: string
                    valueOverridesHash:
                      description: ValueOverridesHash is a hash of the valueOverrides
                        at this revision
                      type: string
                  required:
                  - phase
                  - revision
                  - source
                  - timestamp
                  type: object
                maxItems: 100
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              perCluster:
                description: |-
                  PerCluster reports the per-target-cluster deployment state derived
                  from Fleet BundleDeployment status. Empty until the first Fleet
                  status observation lands.
                items:
                  description: |-
                    ClusterDeploymentStatus reports the deployment state on one target
                    cluster (mirrored from a Fleet BundleDeployment). Populated by the
                    Workload reconciler via pkg/workload/fleet_phase.MapFleetStateToPhase.
                  properties:
                    clusterName:
                      description: ClusterName is the Fleet Cluster.metadata.name
                        of the target.
                      type: string
                    fleetState:
                      description: FleetState is the raw Fleet display.state for diagnostics.
                      type: string
                    lastObservedAt:
                      description: |-
                        LastObservedAt is when the controller last read Fleet status for
                        this cluster.
                      format: date-time
                      type: string
                    phase:
                      description: |-
                        Phase is the workload-domain ClusterPhase value — one of the
                        enumerated constants Pending, Deploying, Running, Failed.
                        The reconciler must never write a value outside this set.
                      type: string
                  required:
                  - clusterName
                  - phase
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - clusterName
                x-kubernetes-list-type: map
              phase:
                description: Phase is the current lifecycle phase
                enum:
                - Pending
                - Deploying
                - Running
                - Degraded
                - Failed
                - RecoveryInProgress
                type: string
              readyReplicas:
                description: ReadyReplicas is the replicas passing readiness check
                format: int32
                type: integer
              recoveryFailureCount:
                description: |-
                  RecoveryFailureCount is the number of consecutive times this
                  Workload has entered Degraded since last reaching Running.
                  Reset to zero on transition to Running or when a spec change exits Failed.
                  When >= spec.strategy.automaticRecovery.failureThreshold and
                  automaticRecovery is enabled, phase transitions to RecoveryInProgress;
                  when automaticRecovery is disabled, phase transitions directly to
                  Failed on the first failed component (bypassing Degraded entirely,
                  so the counter never increments and this field stays at zero).
                format: int32
                type: integer
              replicas:
                description: Replicas is the current total replicas
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
