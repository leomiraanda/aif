{{- if .Values.metrics.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
  name: {{ include "aif-operator.serviceName" (dict "context" . "suffix" "metrics-reader") }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
