{{- if .Values.metrics.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
      {{- include "aif-operator.labels" . | nindent 6 }}
    name: {{ include "aif-operator.serviceName" (dict "context" . "suffix" "metrics-auth") }}
rules:
    - apiGroups:
        - authentication.k8s.io
      resources:
        - tokenreviews
      verbs:
        - create
    - apiGroups:
        - authorization.k8s.io
      resources:
        - subjectaccessreviews
      verbs:
        - create
{{- end }}
