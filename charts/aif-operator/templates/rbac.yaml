apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aif-operator.fullname" . }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ai.suse.com
    resources:
      - blueprints
      - bundles
      - workloads
      - installaiextensions
      - settings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ai.suse.com
    resources:
      - blueprints/status
      - bundles/status
      - workloads/status
      - installaiextensions/status
      - settings/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - catalog.cattle.io
    resources:
      - clusterrepos
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - catalog.cattle.io
    resources:
      - clusterrepos/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - catalog.cattle.io
    resources:
      - uiplugins
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - catalog.cattle.io
    resources:
      - uiplugins/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aif-blueprint-publisher
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ai.suse.com
    resources:
      - blueprints
    verbs:
      - create
      - update
      - patch
  - apiGroups:
      - ai.suse.com
    resources:
      - blueprints/status
    verbs:
      - get
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aif-operator.fullname" . }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aif-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aif-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
