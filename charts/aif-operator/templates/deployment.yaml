apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aif-operator.fullname" . }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aif-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aif-operator.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "aif-operator.serviceAccountName" . }}
      {{- include "aif-operator.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: {{ include "aif-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/aif/bin/operator
          args:
            - --addr=:{{ .Values.service.ports.api }}
            - --health-probe-bind-address=:{{ .Values.service.ports.health }}
            - --metrics-bind-address={{ if .Values.metrics.enabled }}:{{ .Values.service.ports.metrics }}{{ else }}0{{ end }}
            - --webhook-bind-address=:{{ .Values.service.ports.webhook }}
            - --log-level={{ .Values.operator.logLevel }}
            - --log-format={{ .Values.operator.logFormat }}
            - --catalog-refresh={{ .Values.operator.catalogRefresh }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.ports.health }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.service.ports.webhook }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- range .Values.extraEmptyDirs }}
            - name: {{ . | replace "/" "-" | trimPrefix "-" }}
              mountPath: {{ . }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "aif-operator.fullname" . }}
        {{- end }}
        {{- range .Values.extraEmptyDirs }}
        - name: {{ . | replace "/" "-" | trimPrefix "-" }}
          emptyDir: {}
        {{- end }}
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "aif-operator.fullname" . }}-webhook-tls
            defaultMode: 0444
        {{- end }}
