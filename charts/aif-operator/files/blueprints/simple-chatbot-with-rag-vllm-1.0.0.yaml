  description: |
    Simple Chatbot with RAG using vLLM, open-webui, Milvus and open-webui-mcpo.
    Suitable for PoCs and beyond.
    vllm serves the LLM over an OpenAI-compatible API and requires NVIDIA GPU
    nodes (the serving engine requests 1 GPU and uses the nvidia runtime class).
    Requires a default StorageClass defined in the cluster for persistent volumes.
    Requires a cert-manager instance running in the cluster.
    The open-webui chat UI is exposed via Ingress at https://suse-open-webui;
    point a DNS record (or /etc/hosts entry) for the host "suse-open-webui"
    at the cluster's ingress controller to reach it. The hostname can also be patched after deployment.
  displayName: Simple Chatbot with RAG (vLLM and Milvus)
  version: 1.0.0
