---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: blueprints.ai-platform.suse.com
spec:
  group: ai-platform.suse.com
  names:
    kind: Blueprint
    listKind: BlueprintList
    plural: blueprints
    shortNames:
    - bp
    singular: blueprint
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Blueprint is the Schema for the blueprints API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BlueprintSpec defines the desired state of a Blueprint version.
            properties:
              components:
                description: Components are the Helm charts included in this blueprint.
                items:
                  description: BlueprintComponent defines one Helm chart in a Blueprint.
                  properties:
                    chartName:
                      description: ChartName is the Helm chart name.
                      minLength: 1
                      type: string
                    chartRepo:
                      description: ChartRepo is the Rancher ClusterRepo name.
                      minLength: 1
                      type: string
                    chartVersion:
                      description: ChartVersion is the semver chart version.
                      minLength: 1
                      type: string
                    values:
                      description: Values are the Helm values for this component.
                      x-kubernetes-preserve-unknown-fields: true
                    vendor:
                      default: suse
                      description: |-
                        Vendor selects the secret-injection profile. Defaults to "suse" so
                        existing blueprints behave identically after CRD upgrade.
                      enum:
                      - suse
                      - nvidia
                      type: string
                  required:
                  - chartName
                  - chartRepo
                  - chartVersion
                  type: object
                minItems: 1
                type: array
              deprecated:
                description: Deprecated marks this blueprint version as deprecated.
                type: boolean
              description:
                description: Description is an optional human-readable description.
                type: string
              displayName:
                description: DisplayName is the human-readable name shared across
                  all versions.
                minLength: 1
                type: string
              version:
                description: Version is the semver version string of this blueprint.
                pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?$
                type: string
            required:
            - components
            - displayName
            - version
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
