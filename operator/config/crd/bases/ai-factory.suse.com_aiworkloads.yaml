---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aiworkloads.ai-factory.suse.com
spec:
  group: ai-factory.suse.com
  names:
    kind: AIWorkload
    listKind: AIWorkloadList
    plural: aiworkloads
    shortNames:
    - aiwl
    singular: aiworkload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.deployStrategy
      name: Strategy
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AIWorkload is the Schema for the aiworkloads API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIWorkloadSpec defines the desired state of AIWorkload.
            properties:
              componentValues:
                description: ComponentValues holds per-component Helm value overrides.
                items:
                  description: ComponentValueOverride holds per-component Helm value
                    overrides.
                  properties:
                    componentName:
                      description: ComponentName matches source.app.chartName (App)
                        or a Blueprint component name.
                      minLength: 1
                      type: string
                    values:
                      description: Values are the Helm values for this component.
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - componentName
                  type: object
                type: array
              deployStrategy:
                default: Helm
                description: DeployStrategy is the deployment method.
                enum:
                - Helm
                - FleetBundle
                - GitOps
                type: string
              displayName:
                description: DisplayName is the user-provided workload display name.
                minLength: 1
                type: string
              fleetBundleNames:
                description: |-
                  FleetBundleNames are the Fleet Bundle CR names for this workload.
                  App-sourced workloads have exactly one entry; Blueprint-sourced workloads
                  have one entry per component.
                items:
                  type: string
                type: array
              source:
                description: Source describes what is being deployed.
                properties:
                  app:
                    description: App is populated when SourceType=App.
                    properties:
                      chartName:
                        description: ChartName is the Helm chart name.
                        minLength: 1
                        type: string
                      chartRepo:
                        description: ChartRepo is the Rancher ClusterRepo name.
                        minLength: 1
                        type: string
                      chartVersion:
                        description: ChartVersion is the semver chart version.
                        minLength: 1
                        type: string
                      release:
                        description: Release is the Helm release name.
                        minLength: 1
                        type: string
                      vendor:
                        default: suse
                        description: |-
                          Vendor selects the secret-injection profile. Defaults to "suse" so
                          existing App-sourced workloads behave identically after CRD upgrade.
                          The UI is expected to populate this from the chart's repo URL (e.g.
                          "nvidia" for charts pulled from helm.ngc.nvidia.com), mirroring how
                          BlueprintComponent.Vendor is filled at Blueprint-build time.
                        enum:
                        - suse
                        - nvidia
                        type: string
                    required:
                    - chartName
                    - chartRepo
                    - chartVersion
                    - release
                    type: object
                  blueprint:
                    description: Blueprint is populated when SourceType=Blueprint
                      (Epic 2).
                    properties:
                      name:
                        description: Name is the blueprint family slug (label ai-factory.suse.com/blueprint-name).
                        minLength: 1
                        type: string
                      version:
                        description: Version is the semver version of the blueprint
                          to use.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  sourceType:
                    description: SourceType is the source discriminator.
                    enum:
                    - App
                    - Blueprint
                    type: string
                required:
                - sourceType
                type: object
              targetClusters:
                description: TargetClusters are the Rancher cluster IDs to deploy
                  to.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              targetNamespace:
                description: TargetNamespace is the namespace on target clusters.
                minLength: 1
                type: string
            required:
            - displayName
            - source
            - targetNamespace
            type: object
          status:
            description: AIWorkloadStatus defines the observed state of AIWorkload.
            properties:
              clusterStatuses:
                description: ClusterStatuses tracks per-cluster deployment outcome.
                items:
                  description: AIWorkloadClusterStatus tracks per-cluster deployment
                    outcome.
                  properties:
                    clusterId:
                      description: ClusterID is the Rancher cluster ID.
                      minLength: 1
                      type: string
                    message:
                      description: Message provides additional detail.
                      type: string
                    phase:
                      description: Phase is the deployment outcome for this cluster.
                      enum:
                      - Running
                      - Failed
                      - Pending
                      type: string
                  required:
                  - clusterId
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest observations of the AIWorkload
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller.
                format: int64
                minimum: 0
                type: integer
              phase:
                description: Phase is the overall workload phase derived from clusterStatuses.
                enum:
                - Pending
                - Running
                - Degraded
                - Failed
                - Unknown
                type: string
              pullSecretDeliveries:
                description: |-
                  PullSecretDeliveries groups operator-delivered pull-secret names by
                  the namespace they were written into. Replaces the prior flat
                  PullSecretNames field so blueprints with components in different
                  namespaces (BlueprintComponent.TargetNamespace) deliver correctly to
                  each. Used by reconcilePullSecrets to merge into SAs per namespace,
                  by deliverPullSecrets to emit one Fleet Bundle per (cluster, namespace),
                  and by the finalizer to prune SA references on delete.
                items:
                  description: |-
                    PullSecretDelivery groups operator-delivered pull-secret names by the
                    target namespace they were written into. Blueprint workloads where each
                    component opts in to its own BlueprintComponent.TargetNamespace produce
                    one entry per distinct namespace; single-namespace blueprints and
                    App-sourced workloads produce exactly one entry.
                  properties:
                    names:
                      description: |-
                        Names is the set of dockerconfigjson / Opaque Secret names the
                        injectors created in that namespace.
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                    namespace:
                      description: |-
                        Namespace is the target namespace the listed secrets were written
                        into on the operator's local cluster (and where Fleet Bundles ship
                        matching copies on each downstream cluster).
                      minLength: 1
                      type: string
                  required:
                  - names
                  - namespace
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
