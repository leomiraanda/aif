---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: settings.ai-factory.suse.com
spec:
  group: ai-factory.suse.com
  names:
    kind: Settings
    listKind: SettingsList
    plural: settings
    shortNames:
    - aiplmset
    singular: settings
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.lastApplied
      name: Last Applied
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Settings is the Schema for the settings API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SettingsSpec defines the desired state of Settings.
            properties:
              applicationCollection:
                description: ApplicationCollection configures SUSE Application Collection.
                properties:
                  categories:
                    description: Categories filters catalog entries by category.
                    items:
                      type: string
                    type: array
                  tokenSecretRef:
                    description: TokenSecretRef references the access token secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  userSecretRef:
                    description: UserSecretRef references the username secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
              catalogDiscovery:
                description: CatalogDiscovery controls how the SUSE Application Collection
                  is discovered.
                properties:
                  applicationCollectionMode:
                    default: api
                    description: ApplicationCollectionMode selects the discovery strategy.
                    enum:
                    - api
                    - registry-fallback
                    - disabled
                    type: string
                type: object
              fleet:
                description: Fleet configures Fleet GitOps integration.
                properties:
                  authType:
                    description: AuthType is the authentication method.
                    enum:
                    - ssh
                    - token
                    - basic
                    type: string
                  branch:
                    default: main
                    description: Branch is the Git branch to track.
                    type: string
                  credSecretRef:
                    description: CredSecretRef references the Git credential secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  repoURL:
                    description: RepoURL is the Git repository URL.
                    type: string
                type: object
              imageRewrite:
                description: ImageRewrite controls Helm-values prefix substitution
                  at deploy time.
                properties:
                  enabled:
                    description: Enabled applies rewrite rules during Helm values
                      merge.
                    type: boolean
                  rules:
                    description: Rules apply in order; first match per field wins.
                    items:
                      description: ImageRewriteRule defines a single image prefix
                        rewrite rule.
                      properties:
                        match:
                          description: Match is the prefix to match.
                          minLength: 1
                          type: string
                        replace:
                          description: Replace is the substitution prefix.
                          minLength: 1
                          type: string
                      required:
                      - match
                      - replace
                      type: object
                    type: array
                type: object
              nvidia:
                description: Nvidia configures NVIDIA NGC integration.
                properties:
                  tokenSecretRef:
                    description: TokenSecretRef references the NGC API key secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  userSecretRef:
                    description: UserSecretRef references the username secret (NGC
                      username; conventionally "$oauthtoken").
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
              registryEndpoints:
                description: RegistryEndpoints overrides upstream registry defaults
                  for air-gap deployments.
                properties:
                  applicationCollection:
                    description: ApplicationCollection overrides the SUSE App Collection
                      OCI hostname.
                    type: string
                  applicationCollectionAPI:
                    description: ApplicationCollectionAPI overrides the SUSE App Collection
                      HTTP API URL.
                    type: string
                  nvidia:
                    description: |-
                      Nvidia is the OCI URL of a mirrored NVIDIA chart repository for air-gapped installs
                      (e.g. oci://registry.example.com/nvidia). When empty, NVIDIA charts are pulled from the
                      public NGC HTTPS repositories; when set, a single gated OCI ClusterRepo is created at this URL.
                      Note: this is the chart-repo URL only — NVIDIA container images still resolve to nvcr.io and
                      require node-level registry redirection (e.g. containerd hosts.toml) in a true air-gap.
                    type: string
                  suseRegistry:
                    description: SUSERegistry overrides the default SUSE Registry
                      hostname.
                    type: string
                type: object
              suseRegistry:
                description: SUSERegistry configures SUSE Registry integration.
                properties:
                  refreshIntervalMinutes:
                    default: 10
                    description: RefreshIntervalMinutes is the NIM index refresh cadence.
                    format: int32
                    type: integer
                  tokenSecretRef:
                    description: TokenSecretRef references the access token secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  userSecretRef:
                    description: UserSecretRef references the username secret.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
            type: object
          status:
            description: SettingsStatus defines the observed state of Settings.
            properties:
              conditions:
                description: Conditions represent the latest observations of the Settings
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastApplied:
                description: LastApplied is when settings were last applied.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller.
                format: int64
                minimum: 0
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
